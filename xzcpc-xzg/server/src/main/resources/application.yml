spring:
  profiles:
    active: prod
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

app:
  sync:
    enabled: false  # 暂时关闭物料/门店外部API同步
  upload:
    path: ./upload

logging:
  level:
    com.xzcpc: DEBUG
    org.springframework.web: DEBUG
    com.xzcpc.template.mapper: DEBUG

store:
  api:
    url: ${STORE_API_URL:http://119.45.162.160:5174/api/publish/entities/mendianxinxi/records}
    key: ${STORE_API_KEY}

material:
  api:
    url: ${MATERIAL_API_URL:http://119.45.162.160:5174/api/publish/entities/yuancailiao/records}
    key: ${STORE_API_KEY}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto

wx:
  miniapp:
    appid: wx0000000000000001
    secret: ${WX_APP_SECRET}
    msg-data-format: JSON

mp:
  jwt:
    secret: ${MP_JWT_SECRET}
    expire-hours: 168

# 飞书应用配置（H5 登录）
feishu:
  app-id: cli_aa90f3d66d7adbb7
  app-secret: ${FEISHU_APP_SECRET}

# 总部端管理员 JWT
report:
  api:
    token: ${REPORT_API_TOKEN}

admin:
  jwt:
    secret: ${ADMIN_JWT_SECRET}
    expire-hours: 72
